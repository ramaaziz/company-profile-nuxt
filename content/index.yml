seo:
  title: PT Permata Jaya Tehnik
  description: Founded on dedication and expertise, PT Permata Jaya Tehnik specializes in high-quality construction services and general trading. We are committed to healthy business competition and national development.
title: Your Trusted Partner in Electrical & Mechanical Construction
description: Founded on dedication and expertise, PT Permata Jaya Tehnik specializes in high-quality construction services and general trading. We are committed to healthy business competition and national development.

section:
  title: "[Visi Kami]{.text-primary} PT Permata Jaya Tehnik menjadi mitra kerja terpercaya"
  description: Untuk mencapai visi tersebut, PT Permata Jaya Tehnik terus berinovasi dalam manajemen proyek dan pengembangan SDM yang berdedikasi.
  images:
    mobile: "/images/TranmissionTower.png"
    desktop: "/images/TranmissionTowerDesk.png"
  features:
    - title: Menempatkan kepuasan mitra sebagai komitmen utama
      description: Menjamin presisi tinggi di setiap tahapan proyek infrastruktur untuk hasil maksimal yang sesuai standar mitra.
      class: border-l border-primary pl-4
    - title: Memberikan kenyamanan terhadap pelanggan dengan memberikan qualitas terbaik
      description: Kombinasi material unggul dan pengerjaan teliti demi layanan yang transparan, tepat waktu, dan andal bagi pelanggan.
      class: border-l border-default pt-4 pl-4
features:
  title: Rekam jejak [proyek strategis]{.text-primary}
  description: Visualisasi dedikasi kami dalam membangun infrastruktur kelistrikan yang aman, efisien, dan berkelanjutan di seluruh Indonesia.
  items:
    - title: Penanganan Tower Kritis
      description: Penanganan tower kritis untuk UPT Probolinggo
      image:
        light: "/images/card/cardimg.png"
        dark: "/images/card/cardimg.png"
    - title: Pekerjaan Tower Emergency
      description: Pekerjaan tower emergency INDORAMA di Purwakarta
      image:
        light: "/images/card/cardimg4.png"
        dark: "/images/card/cardimg4.png"
    - title: Penggantian Kabel Power
      description: Penggantian kabel power dan pembuatan Duct untuk UPT Gresik
      image:
        light: "/images/card/cardimg3.png"
        dark: "/images/card/cardimg3.png"
    - title: Penggantian Proteksi Relay
      description: Pekerjaan penggantian proteksi relay untuk UPT Bandung
      image:
        light: "/images/card/cardimg5.png"
        dark: "/images/card/cardimg5.png"
    - title: Pekerjaan Ipal
      description: Pekerjaan IPAL dan Septic Tank untuk UPT Surabaya
      image:
        light: "/images/card/cardimg2.png"
        dark: "/images/card/cardimg2.png"
    - title: Pekerjaan Jumper SUTT
      description: Pekerjaan jumper Saluran Udara Tegangan Tinggi di Tambun
      image:
        light: "/images/card/cardimg6.png"
        dark: "/images/card/cardimg6.png"
steps:
  title: Sertifikasi dan Standar [Kualitas]{.text-primary}
  description: Komitmen kami terhadap keunggulan operasional dibuktikan melalui kepatuhan ketat terhadap standar internasional. Kami memastikan setiap proyek infrastruktur memenuhi kriteria keamanan, efisiensi, dan keberlanjutan yang diakui secara global.
  sertifikasi:
    - title: ISO 9001:2015
      description: Sistem Manajemen Mutu untuk memastikan kualitas layanan yang konsisten dan memuaskan pelanggan.
    - title: ISO 14001:2015
      description: Sistem Manajemen Lingkungan untuk mengelola dampak lingkungan dan mendukung pembangunan berkelanjutan.
    - title: OHSAS 18001:2007
      description: Sistem Manajemen Kesehatan dan Keselamatan Kerja untuk menciptakan lingkungan kerja yang aman dan sehat bagi karyawan.

  items:
    - title: Connect Your IDE
      description: Seamlessly integrate with VS Code, JetBrains, or your preferred editor. Get started in under 2 minutes with zero configuration needed.
      image:
        light: "/images/card/cardimg.png"
        dark: "/images/card/cardimg.png"
    - title: Track & Analyze
      description: Our AI silently monitors your coding patterns to identify your peak productivity hours and potential workflow bottlenecks.
      image:
        light: "/images/card/cardimg2.png"
        dark: "/images/card/cardimg2.png"
    - title: Optimize & Code Smarter
      description: Receive personalized recommendations to enhance your coding efficiency. Watch your productivity soar with data-driven insights.
      image:
        light: "/images/card/cardimg3.png"
        dark: "/images/card/cardimg3.png"
    - title: Connect Your IDE
      description: Seamlessly integrate with VS Code, JetBrains, or your preferred editor. Get started in under 2 minutes with zero configuration needed.
      image:
        light: "/images/card/cardimg4.png"
        dark: "/images/card/cardimg4.png"

