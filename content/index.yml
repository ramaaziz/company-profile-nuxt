seo:
  title: PT Permata Jaya Tehnik
  description: Founded on dedication and expertise, PT Permata Jaya Tehnik specializes in high-quality construction services and general trading. We are committed to healthy business competition and national development.
title: Your Trusted Partner in Electrical & Mechanical Construction
description: Founded on dedication and expertise, PT Permata Jaya Tehnik specializes in high-quality construction services and general trading. We are committed to healthy business competition and national development.

section:
  title: "[Visi Kami]{.text-primary} PT Permata Jaya Tehnik menjadi mitra kerja terpercaya"
  description: Untuk mencapai visi tersebut, PT Permata Jaya Tehnik terus berinovasi dalam manajemen proyek dan pengembangan SDM yang berdedikasi.
  images:
    mobile: "/images/TranmissionTower.png"
    desktop: "/images/TranmissionTowerDesk.png"
  features:
    - title: Menempatkan kepuasan mitra sebagai komitmen utama
      description: Menjamin presisi tinggi di setiap tahapan proyek infrastruktur untuk hasil maksimal yang sesuai standar mitra.
      class: border-l border-primary pl-4
    - title: Memberikan kenyamanan terhadap pelanggan dengan memberikan qualitas terbaik
      description: Kombinasi material unggul dan pengerjaan teliti demi layanan yang transparan, tepat waktu, dan andal bagi pelanggan.
      class: border-l border-default pt-4 pl-4
